name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF python-docx Pillow pyinstaller tkinterdnd2

    - name: Build exe with PyInstaller
      run: |
        python -m PyInstaller `
          --windowed `
          --name "逐字稿" `
          --add-data "fonts;fonts" `
          --hidden-import "annotation_manager" `
          --hidden-import "annotation_store" `
          --hidden-import "theme" `
          --hidden-import "fitz" `
          --hidden-import "docx" `
          --hidden-import "PIL" `
          --noconfirm `
          main.py

    - name: Create Inno Setup script
      run: |
        $iss = @"
        [Setup]
        AppName=逐字稿
        AppVersion=1.1
        DefaultDirName={autopf}\逐字稿
        DefaultGroupName=逐字稿
        OutputDir=installer
        OutputBaseFilename=zhuzigao_installer
        Compression=lzma
        SolidCompression=yes
        WizardStyle=modern

        [Files]
        Source: "dist\逐字稿\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\逐字稿"; Filename: "{app}\逐字稿.exe"
        Name: "{commondesktop}\逐字稿"; Filename: "{app}\逐字稿.exe"

        [Run]
        Filename: "{app}\逐字稿.exe"; Description: "立即启动逐字稿"; Flags: postinstall nowait
        "@
        $iss | Out-File -FilePath "setup.iss" -Encoding UTF8

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build installer
      run: iscc setup.iss

    - name: Write Gitee upload script
      run: |
        $py = @"
        import os, json, urllib.request, subprocess, sys

        token = os.environ['GITEE_TOKEN']
        base = "https://gitee.com/api/v5/repos/thatgameapple/zhuzigao"

        # delete old release
        try:
            req = urllib.request.Request(
                base + "/releases/tags/v1.1",
                data=json.dumps({"access_token": token}).encode(),
                headers={"Content-Type": "application/json"},
                method="DELETE"
            )
            urllib.request.urlopen(req)
            print("Old release deleted")
        except Exception as e:
            print("Delete (ignore):", e)

        # create new release
        payload = {
            "access_token": token,
            "tag_name": "v1.1",
            "name": "\u9010\u5b57\u7a3f Windows v1.1",
            "body": "Windows\u5b89\u88c5\u5305",
            "target_commitish": "master"
        }
        req = urllib.request.Request(
            base + "/releases",
            data=json.dumps(payload).encode(),
            headers={"Content-Type": "application/json"},
            method="POST"
        )
        try:
            resp = urllib.request.urlopen(req)
            release = json.loads(resp.read())
        except urllib.request.HTTPError as e:
            print("Create release error:", e.read().decode())
            sys.exit(1)
        release_id = release['id']
        print("Release ID:", release_id)

        # upload file
        r = subprocess.run([
            "curl", "-s", "-X", "POST",
            base + "/releases/" + str(release_id) + "/attach_files",
            "-F", "access_token=" + token,
            "-F", "file=@installer/zhuzigao_installer.exe"
        ], capture_output=True, text=True)
        print("stdout:", r.stdout)
        print("stderr:", r.stderr)
        if r.returncode != 0:
            sys.exit(1)
        "@
        $py | Out-File -FilePath "gitee_upload.py" -Encoding UTF8

    - name: Upload to Gitee Release
      shell: bash
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        python3 gitee_upload.py 2>&1 | tee output.txt
        echo "## Gitee Upload Log" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat output.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
