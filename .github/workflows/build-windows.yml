name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF python-docx Pillow pyinstaller tkinterdnd2

    - name: Build exe with PyInstaller
      run: |
        python -m PyInstaller `
          --windowed `
          --name "逐字稿" `
          --add-data "fonts;fonts" `
          --hidden-import "annotation_manager" `
          --hidden-import "annotation_store" `
          --hidden-import "theme" `
          --hidden-import "fitz" `
          --hidden-import "docx" `
          --hidden-import "PIL" `
          --noconfirm `
          main.py

    - name: Create Inno Setup script
      run: |
        $iss = @"
        [Setup]
        AppName=逐字稿
        AppVersion=1.2
        DefaultDirName={autopf}\逐字稿
        DefaultGroupName=逐字稿
        OutputDir=installer
        OutputBaseFilename=zhuzigao_installer
        Compression=lzma
        SolidCompression=yes
        WizardStyle=modern

        [Files]
        Source: "dist\逐字稿\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\逐字稿"; Filename: "{app}\逐字稿.exe"
        Name: "{commondesktop}\逐字稿"; Filename: "{app}\逐字稿.exe"

        [Run]
        Filename: "{app}\逐字稿.exe"; Description: "立即启动逐字稿"; Flags: postinstall nowait
        "@
        $iss | Out-File -FilePath "setup.iss" -Encoding UTF8

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build installer
      run: iscc setup.iss

    - name: Push installer to Gitee
      shell: bash
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git clone "https://thatgameapple:${GITEE_TOKEN}@gitee.com/thatgameapple/zhuzigao.git" gitee_repo
        cp installer/zhuzigao_installer.exe gitee_repo/
        cd gitee_repo
        git add zhuzigao_installer.exe
        git commit -m "update windows installer"
        git push
