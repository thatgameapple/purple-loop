name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF python-docx Pillow pyinstaller tkinterdnd2

    - name: Build exe with PyInstaller
      run: |
        python -m PyInstaller `
          --windowed `
          --name "逐字稿" `
          --add-data "fonts;fonts" `
          --hidden-import "annotation_manager" `
          --hidden-import "annotation_store" `
          --hidden-import "theme" `
          --hidden-import "fitz" `
          --hidden-import "docx" `
          --hidden-import "PIL" `
          --noconfirm `
          main.py

    - name: Create Inno Setup script
      run: |
        $iss = @"
        [Setup]
        AppName=逐字稿
        AppVersion=1.1
        DefaultDirName={autopf}\逐字稿
        DefaultGroupName=逐字稿
        OutputDir=installer
        OutputBaseFilename=zhuzigao_installer
        Compression=lzma
        SolidCompression=yes
        WizardStyle=modern

        [Files]
        Source: "dist\逐字稿\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs

        [Icons]
        Name: "{group}\逐字稿"; Filename: "{app}\逐字稿.exe"
        Name: "{commondesktop}\逐字稿"; Filename: "{app}\逐字稿.exe"

        [Run]
        Filename: "{app}\逐字稿.exe"; Description: "立即启动逐字稿"; Flags: postinstall nowait
        "@
        $iss | Out-File -FilePath "setup.iss" -Encoding UTF8

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build installer
      run: iscc setup.iss

    - name: Upload to Gitee Release
      shell: bash
      env:
        GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      run: |
        # 删除旧 release（忽略错误）
        curl -s -X DELETE "https://gitee.com/api/v5/repos/thatgameapple/zhuzigao/releases/tags/v1.1" \
          -H "Content-Type: application/json" \
          -d "{\"access_token\":\"$GITEE_TOKEN\"}" || true

        # 创建新 release
        RELEASE=$(curl -s -X POST "https://gitee.com/api/v5/repos/thatgameapple/zhuzigao/releases" \
          -H "Content-Type: application/json" \
          -d "{\"access_token\":\"$GITEE_TOKEN\",\"tag_name\":\"v1.1\",\"name\":\"逐字稿 Windows v1.1\",\"body\":\"Windows安装包\",\"target_commitish\":\"master\"}")
        echo "Release response: $RELEASE"
        RELEASE_ID=$(echo $RELEASE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['id'])" 2>&1)
        echo "Release ID: $RELEASE_ID"

        # 上传文件
        curl -v -X POST "https://gitee.com/api/v5/repos/thatgameapple/zhuzigao/releases/$RELEASE_ID/attach_files" \
          -F "access_token=$GITEE_TOKEN" \
          -F "file=@installer/zhuzigao_installer.exe"
