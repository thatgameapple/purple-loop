name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.6)'
        required: true
        default: '1.6'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 Pillow pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --windowed `
            --name "purple loop" `
            --add-data "fonts;fonts" `
            --hidden-import "annotation_manager" `
            --hidden-import "annotation_store" `
            --hidden-import "theme" `
            --hidden-import "PIL" `
            --noconfirm `
            main_new.py

      - name: Package as ZIP
        run: |
          Compress-Archive -Path "dist\purple loop" -DestinationPath "purple_loop_${{ github.event.inputs.version }}_windows.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: purple_loop_${{ github.event.inputs.version }}_windows.zip
          fail_on_unmatched_files: true
